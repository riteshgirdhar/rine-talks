/* ─── Newsletter ─── */
function Newsletter() {
  const [email, setEmail] = useState('');
  const [submitted, setSubmitted] = useState(false);

  const handleSubmit = (e) => {
    e.preventDefault();
    if (email) {
      setSubmitted(true);
      setEmail('');
    }
  };

  return (
    <section id="newsletter" className="relative py-24 md:py-32">
      <div className="max-w-3xl mx-auto px-6 text-center scroll-reveal">
        <span className="text-xs font-medium text-gold tracking-[0.25em] uppercase">Newsletter</span>
        <h2 className="font-display font-bold text-white mt-3"
            style={{ fontSize: 'clamp(1.75rem, 1.2rem + 2vw, 3rem)' }}>
          Stay Informed
        </h2>
        <p className="text-smoke mt-4 max-w-lg mx-auto mb-10" style={{ fontSize: 'clamp(0.95rem, 0.9rem + 0.25vw, 1.1rem)' }}>
          Get weekly deep-dive summaries delivered to your inbox. No fluff — just the insights that matter.
        </p>

        {submitted ? (
          <div className="gold-border-glow rounded-2xl bg-charcoal-700/50 p-8">
            <div className="w-16 h-16 rounded-full bg-gold/20 border border-gold/30 mx-auto flex items-center justify-center mb-4">
              <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#c9a84c" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
            </div>
            <p className="text-lg font-display font-semibold text-white">You're in.</p>
            <p className="text-sm text-smoke mt-2">Watch your inbox for your first deep-dive.</p>
          </div>
        ) : (
          <form onSubmit={handleSubmit} className="gold-border-glow rounded-2xl bg-charcoal-700/50 p-2 flex flex-col sm:flex-row gap-2 max-w-xl mx-auto">
            <input
              type="email"
              required
              value={email}
              onChange={(e) => setEmail(e.target.value)}
              placeholder="Enter your email"
              className="flex-1 px-5 py-4 bg-charcoal-800/80 rounded-xl text-white placeholder:text-smoke-dark text-base border border-transparent focus:border-gold/30 focus:outline-none transition-colors duration-200"
              aria-label="Email address"
            />
            <button type="submit"
                    className="btn-gold px-8 py-4 bg-gold text-charcoal-900 font-bold text-base rounded-xl tracking-wide whitespace-nowrap">
              Subscribe
            </button>
          </form>
        )}

        <p className="text-xs text-smoke-dark mt-4">
          Free. Unsubscribe anytime. No spam, ever.
        </p>
      </div>
    </section>
  );
}
