/* ═══════════════════════════════════════════════════════════════════
   SCROLL REVEAL HOOK
   ═══════════════════════════════════════════════════════════════════ */

function useScrollReveal() {
  useEffect(() => {
    const els = document.querySelectorAll('.scroll-reveal');
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('revealed');
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });
    els.forEach(el => observer.observe(el));
    return () => observer.disconnect();
  });
}

/* ═══════════════════════════════════════════════════════════════════
   YOUTUBE API HOOK
   ═══════════════════════════════════════════════════════════════════ */

function useYouTubeData() {
  const [videos, setVideos] = useState([]);
  const [loading, setLoading] = useState(true);
  const [channelStats, setChannelStats] = useState(null);

  useEffect(() => {
    if (!CONFIG.YOUTUBE_API_KEY || !CONFIG.YOUTUBE_CHANNEL_ID) {
      setLoading(false);
      return;
    }

    async function fetchData() {
      try {
        // Fetch channel info
        const channelRes = await fetch(
          `https://www.googleapis.com/youtube/v3/channels?part=statistics,snippet&id=${CONFIG.YOUTUBE_CHANNEL_ID}&key=${CONFIG.YOUTUBE_API_KEY}`
        );
        const channelData = await channelRes.json();
        if (channelData.items && channelData.items.length > 0) {
          setChannelStats(channelData.items[0].statistics);
        }

        // Fetch latest videos
        const searchRes = await fetch(
          `https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${CONFIG.YOUTUBE_CHANNEL_ID}&maxResults=12&order=date&type=video&key=${CONFIG.YOUTUBE_API_KEY}`
        );
        const searchData = await searchRes.json();
        
        if (searchData.items) {
          const videoIds = searchData.items.map(i => i.id.videoId).join(',');
          const detailsRes = await fetch(
            `https://www.googleapis.com/youtube/v3/videos?part=contentDetails,statistics,snippet&id=${videoIds}&key=${CONFIG.YOUTUBE_API_KEY}`
          );
          const detailsData = await detailsRes.json();
          setVideos(detailsData.items || []);
        }
      } catch (err) {
        console.error('YouTube API error:', err);
      } finally {
        setLoading(false);
      }
    }

    fetchData();
  }, []);

  return { videos, loading, channelStats };
}
